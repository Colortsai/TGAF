<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face {
  font-family: 'RiXingSong';
  src: url('assets/rixingsong-semibold.otf') format('opentype');
  font-weight: 600;
  font-display: swap;
}
@keyframes twinkle {
  0%,100% { opacity: var(--lo, 0.18); transform: scale(0.8); }
  50%     { opacity: var(--hi, 1); transform: scale(1.15); }
}
@keyframes frameFloat {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-7px); }
  100% { transform: translateY(0px); }
}
* { box-sizing: border-box; }
</style>
</helmet>
<div style="width: 1600px; min-height: 980px; background: #04060f; font-family: 'Noto Serif TC', serif; position: relative; overflow: hidden;">

  <img src="assets/galaxy.png" alt="" style="position: absolute; top:0; left:0; width: 100%; height: 1500px; object-fit: cover; opacity: 0.9;" />
  <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(4,6,15,0.55) 0%, rgba(4,6,15,0.78) 55%, #04060f 100%);"></div>

  <div style="position: absolute; top:0; left:0; width:100%; height: 1500px; z-index: 2; pointer-events: none;">
    <sc-for list="{{ stars }}" as="s" hint-placeholder-count="0">
      <span style="{{ s.style }}"></span>
    </sc-for>
  </div>

  <nav style="position: relative; z-index: 30; height: 64px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 40px;">
    <a href="Banner.dc.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
      <img src="assets/logo.png" alt="臺北生成藝術節 TAIPEI GENERATIVE ART FESTIVAL" style="height: 44px; width: auto; display: block;" />
    </a>
    <div style="display: flex; align-items: center; gap: 50px;">
      <a href="Banner.dc.html" style="text-decoration:none; color:#fff; opacity:0.8; font-size:18px; letter-spacing:3px; font-weight:500;" style-hover="opacity:1;">首頁</a>
      <a href="#" style="text-decoration:none; color:#fff; opacity:0.8; font-size:18px; letter-spacing:3px; font-weight:500;" style-hover="opacity:1;">活動資訊</a>
      <a href="#" style="text-decoration:none; color:#fff; opacity:0.8; font-size:18px; letter-spacing:3px; font-weight:500;" style-hover="opacity:1;">活動公告</a>
      <a href="#" style="text-decoration:none; color:#fff; opacity:0.8; font-size:18px; letter-spacing:3px; font-weight:500;" style-hover="opacity:1;">最新消息</a>
      <a href="Gallery.dc.html" style="position:relative; text-decoration:none; color:#fff; opacity:1; font-size:18px; letter-spacing:3px; font-weight:500;">線上藝廊<span style="position:absolute; left:0; right:0; bottom:-2px; height:2px; border-radius:2px; background:#fff;"></span></a>
    </div>
  </nav>

  <div style="position: relative; z-index: 10; padding: 56px 64px 80px;">

    <a href="Gallery.dc.html" style="display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:rgba(255,255,255,0.7); font-family:'Noto Sans TC',sans-serif; font-size:16px; letter-spacing:3px; margin-bottom:20px;" style-hover="color:#fff;">← 返回線上藝廊</a>
    <div style="display: flex; align-items: flex-end; gap: 30px; margin-bottom: 12px;">
      <div style="font-family: 'RiXingSong','Noto Serif TC',serif; font-weight: 600; color:#fff; font-size: 88px; line-height: 0.9; letter-spacing: 4px; text-shadow: 0 4px 24px rgba(0,0,0,0.6);">2024</div>
      <div style="flex: none; width: 120px; height: 1px; background: rgba(255,255,255,0.55); margin-bottom: 22px;"></div>
      <div style="flex: none; display: flex; align-items: center; gap: 16px; margin-bottom: 14px;">
        <sc-for list="{{ chips }}" as="c" hint-placeholder-count="3">
          <button onClick="{{ c.onClick }}" style="{{ c.style }}" style-hover="border-color: rgba(255,255,255,0.85); color:#fff;">{{ c.label }}</button>
        </sc-for>
      </div>
      <div style="flex: 1;"></div>
      <div style="flex: none; white-space: nowrap; font-family: 'Noto Sans TC', sans-serif; color: rgba(255,255,255,0.55); font-size: 15px; letter-spacing: 3px; margin-bottom: 18px;">類別 ｜ 海報設計　·　共 200 件作品</div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(4, 300px); justify-content: space-between; row-gap: 44px; margin-top: 40px;">
      <sc-for list="{{ works }}" as="w" hint-placeholder-count="12">
        <a href="Artwork.dc.html?year=2024" style="{{ w.linkStyle }}" style-hover="transform: translateY(-6px) scale(1.025);">
          <div style="position: relative; padding: 10px; height: {{ w.h }}; border: 1px solid rgba(255,255,255,0.34); background: rgba(255,255,255,0.025); box-shadow: 0 16px 44px rgba(0,0,0,0.5); transition: box-shadow .35s, border-color .35s;">
            <div style="position: absolute; inset: 4px; border: 1px solid rgba(255,255,255,0.14); pointer-events: none;"></div>
            <div style="position: absolute; inset: 4px; pointer-events: none; box-shadow: inset 0 0 0 1px rgba(255,255,255,0); transition: box-shadow .35s;"></div>
            <div style="width: 100%; height: 100%; background: rgba(255,255,255,0.045); display: flex; align-items: center; justify-content: center;">
              <span style="font-family: 'Noto Sans TC', sans-serif; color: rgba(255,255,255,0.22); font-size: 13px; letter-spacing: 4px;">作品 {{ w.no }}</span>
            </div>
          </div>
        </a>
      </sc-for>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { filter: '全部' };

  buildStars() {
    if (this._stars) return this._stars;
    const rnd = (s) => { const x = Math.sin(s * 99.13) * 43758.5453; return x - Math.floor(x); };
    const out = [];
    for (let i = 0; i < 110; i++) {
      const left = rnd(i + 1) * 100;
      const top = rnd(i + 7.3) * 100;
      const size = 1 + rnd(i + 3.1) * 2.2;
      const dur = 2.0 + rnd(i + 5.7) * 3.8;
      const delay = rnd(i + 11.9) * 4;
      const hi = 0.6 + rnd(i + 2.2) * 0.4;
      const big = rnd(i + 8.8) > 0.9;
      const glow = big ? `0 0 ${size * 3}px ${size}px rgba(180,200,255,0.5)` : 'none';
      out.push({ style: `position:absolute; left:${left}%; top:${top * 15}px; width:${size}px; height:${size}px; border-radius:50%; background:#eef3ff; box-shadow:${glow}; --hi:${hi}; --lo:0.1; animation: twinkle ${dur}s ease-in-out ${delay}s infinite; will-change: opacity, transform;` });
    }
    this._stars = out;
    return out;
  }

  renderVals() {
    const labels = ['全部', '客家', '原住民', '共榮'];
    const active = this.state.filter;
    const chips = labels.map((label) => {
      const on = label === active;
      return {
        label,
        onClick: () => this.setState({ filter: label }),
        style: `flex:none; white-space:nowrap; background:${on ? 'rgba(255,255,255,0.16)' : 'transparent'}; border:1px solid ${on ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.35)'}; color:${on ? '#fff' : 'rgba(255,255,255,0.7)'}; border-radius:999px; padding:7px 20px; font-family:'Noto Sans TC',sans-serif; font-size:16px; letter-spacing:2px; cursor:pointer; transition:all .2s ease;`
      };
    });

    const aspects = [0.82, 0.78, 0.78, 0.8, 1.08, 0.8, 1.45, 1.5, 1.25, 0.85, 1.4, 0.82];
    const col = 300;
    const works = aspects.map((a, i) => ({
      no: String(i + 1).padStart(3, '0'),
      h: Math.round(col / a) + 'px',
      linkStyle: `display:block; text-decoration:none; transition: transform .4s cubic-bezier(.2,.7,.3,1); will-change: transform; animation: frameFloat ${5.5 + (i % 4) * 0.6}s ease-in-out ${(i % 5) * 0.4}s infinite;`
    }));

    return { chips, works, stars: this.buildStars() };
  }
}
</script>
</body>
</html>

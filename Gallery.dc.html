<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face {
  font-family: 'RiXingSong';
  src: url('assets/rixingsong-semibold.otf') format('opentype');
  font-weight: 600;
  font-display: swap;
}
@keyframes cardFloat {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-16px); }
  100% { transform: translateY(0px); }
}
@keyframes twinkle {
  0%,100% { opacity: var(--lo, 0.18); transform: scale(0.8) rotate(var(--rot,0deg)); }
  50%     { opacity: var(--hi, 1); transform: scale(1.15) rotate(var(--rot,0deg)); }
}
* { box-sizing: border-box; }
</style>
<script src="assets/image-slot.js"></script>
</helmet>
<div style="width: 1600px; height: 980px; background: #04060f; font-family: 'Noto Serif TC', serif; overflow: hidden; position: relative;">

  <nav style="position: relative; z-index: 30; height: 64px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 40px;">
    <a href="Banner.dc.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
      <img src="assets/logo.png" alt="臺北生成藝術節 TAIPEI GENERATIVE ART FESTIVAL" style="height: 44px; width: auto; display: block;" />
    </a>
    <div style="display: flex; align-items: center; gap: 50px;">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="5">
        <a href="{{ item.href }}" style="{{ item.style }}" style-hover="color: #ffffff; opacity: 1;">
          <span>{{ item.label }}</span>
          <span style="{{ item.underline }}"></span>
        </a>
      </sc-for>
    </div>
  </nav>

  <div style="position: relative; height: 916px; overflow: hidden;">

    <img src="assets/galaxy.png" alt="" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;" />
    <div style="position: absolute; inset: 0; background: radial-gradient(130% 100% at 50% 45%, rgba(4,6,15,0.1) 35%, rgba(4,6,15,0.72) 100%);"></div>

    <div style="position: absolute; inset: 0; z-index: 5; pointer-events: none;">
      <sc-for list="{{ stars }}" as="s" hint-placeholder-count="0">
        <span style="{{ s.style }}"></span>
      </sc-for>
      <sc-for list="{{ sparkles }}" as="s" hint-placeholder-count="0">
        <span style="{{ s.style }}"></span>
      </sc-for>
    </div>

    <svg viewBox="0 0 1600 916" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 8; pointer-events: none;">
      <polyline points="300,256 760,486 1306,300" fill="none" stroke="rgba(220,228,255,0.38)" stroke-width="1" />
      <line x1="760" y1="486" x2="360" y2="720" stroke="rgba(220,228,255,0.22)" stroke-width="1" />
      <circle cx="760" cy="486" r="3.6" fill="rgba(235,240,255,0.95)" />
      <circle cx="300" cy="256" r="2.2" fill="rgba(235,240,255,0.8)" />
      <circle cx="1306" cy="300" r="2.2" fill="rgba(235,240,255,0.8)" />
      <circle cx="360" cy="720" r="1.8" fill="rgba(235,240,255,0.6)" />
      <circle cx="760" cy="486" r="0" fill="none" />
    </svg>

    <a href="Year2025.dc.html" style="position: absolute; z-index: 20; left: 110px; top: 158px; text-decoration: none; transition: transform .4s cubic-bezier(.2,.7,.3,1); will-change: transform;" style-hover="transform: scale(1.05); z-index: 45;">
      <div style="animation: cardFloat 6.5s ease-in-out 0s infinite;">
        <div style="padding: 6px; border: 1px solid rgba(255,255,255,0.45); box-shadow: 0 14px 40px rgba(0,0,0,0.5);">
          <div style="border: 1px solid rgba(255,255,255,0.3); font-size:0;">
            <img src="assets/visual-2025.jpg" alt="2025 主視覺" style="display:block; width:380px; height:189px; object-fit:cover;" />
          </div>
        </div>
        <div style="margin-top: 14px; font-family: 'RiXingSong','Noto Serif TC',serif; color:#fff; font-size: 34px; letter-spacing: 4px; text-shadow: 0 3px 16px rgba(0,0,0,0.7);">2025</div>
      </div>
    </a>

    <a href="Year2024.dc.html" style="position: absolute; z-index: 20; left: 1178px; top: 172px; text-decoration: none; transition: transform .4s cubic-bezier(.2,.7,.3,1); will-change: transform;" style-hover="transform: scale(1.05); z-index: 45;">
      <div style="animation: cardFloat 7.5s ease-in-out 1.1s infinite;">
        <div style="padding: 6px; border: 1px solid rgba(255,255,255,0.45); box-shadow: 0 14px 40px rgba(0,0,0,0.5);">
          <div style="border: 1px solid rgba(255,255,255,0.3); font-size:0;">
            <img src="assets/visual-2024.png" alt="2024 主視覺" style="display:block; width:256px; height:256px; object-fit:cover;" />
          </div>
        </div>
        <div style="margin-top: 13px; text-align: right; font-family: 'RiXingSong','Noto Serif TC',serif; color:#fff; font-size: 32px; letter-spacing: 4px; text-shadow: 0 3px 16px rgba(0,0,0,0.7);">2024</div>
      </div>
    </a>

    <a href="Year2026.dc.html" style="position: absolute; z-index: 21; left: 558px; top: 282px; text-decoration: none; transition: transform .4s cubic-bezier(.2,.7,.3,1); will-change: transform;" style-hover="transform: scale(1.04); z-index: 45;">
      <div style="animation: cardFloat 6.9s ease-in-out 0.5s infinite;">
        <div style="padding: 8px; border: 1px solid rgba(255,255,255,0.55); box-shadow: 0 22px 60px rgba(0,0,0,0.62), 0 0 60px rgba(120,150,220,0.2);">
          <div style="border: 1px solid rgba(255,255,255,0.32); font-size:0;">
            <img src="assets/visual-2026.png" alt="2026 主視覺" style="display:block; width:404px; height:404px; object-fit:cover;" />
          </div>
        </div>
        <div style="margin-top: 18px; text-align: center; font-family: 'RiXingSong','Noto Serif TC',serif; color:#fff; font-size: 52px; letter-spacing: 5px; text-shadow: 0 4px 20px rgba(0,0,0,0.75);">2026</div>
      </div>
    </a>

    <div style="position: absolute; z-index: 22; left: 88px; bottom: 96px; font-family: 'RiXingSong','Noto Serif TC',serif; font-weight: 600; color:#fff; font-size: 48px; line-height: 1.22; letter-spacing: 6px; text-shadow: 0 4px 22px rgba(0,0,0,0.75);">臺北生成藝術節<br />線上藝廊</div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  buildStars() {
    if (this._stars) return this._stars;
    const rnd = (s) => { const x = Math.sin(s * 99.13) * 43758.5453; return x - Math.floor(x); };
    const out = [];
    for (let i = 0; i < 80; i++) {
      const left = rnd(i + 1) * 100;
      const top = rnd(i + 7.3) * 100;
      const size = 1 + rnd(i + 3.1) * 2.2;
      const dur = 2.0 + rnd(i + 5.7) * 3.8;
      const delay = rnd(i + 11.9) * 4;
      const hi = 0.65 + rnd(i + 2.2) * 0.35;
      const big = rnd(i + 8.8) > 0.88;
      const glow = big ? `0 0 ${size * 3}px ${size}px rgba(180,200,255,0.5)` : 'none';
      out.push({ style: `position:absolute; left:${left}%; top:${top}%; width:${size}px; height:${size}px; border-radius:50%; background:#eef3ff; box-shadow:${glow}; --hi:${hi}; --lo:0.1; --rot:0deg; animation: twinkle ${dur}s ease-in-out ${delay}s infinite; will-change: opacity, transform;` });
    }
    this._stars = out;
    return out;
  }

  buildSparkles() {
    if (this._sparkles) return this._sparkles;
    const pts = [
      [6, 12], [33, 92], [3, 74], [49, 6], [62, 88],
      [95, 58], [88, 16], [40, 50], [72, 36], [18, 40], [97, 90]
    ];
    const rnd = (s) => { const x = Math.sin(s * 51.7) * 24791.13; return x - Math.floor(x); };
    this._sparkles = pts.map((p, i) => {
      const sz = 12 + rnd(i + 1) * 12;
      const dur = 2.6 + rnd(i + 4) * 3.2;
      const delay = rnd(i + 9) * 4;
      const t = Math.max(1, sz * 0.07);
      const bg = `linear-gradient(#fff,#fff) center/${t}px 100% no-repeat, linear-gradient(#fff,#fff) center/100% ${t}px no-repeat`;
      return { style: `position:absolute; left:${p[0]}%; top:${p[1]}%; width:${sz}px; height:${sz}px; background:${bg}; filter: drop-shadow(0 0 3px rgba(200,215,255,0.8)); --hi:0.95; --lo:0.15; --rot:0deg; animation: twinkle ${dur}s ease-in-out ${delay}s infinite; will-change: opacity, transform;` };
    });
    return this._sparkles;
  }

  renderVals() {
    const items = [
      { label: '首頁', href: 'Banner.dc.html', active: false },
      { label: '活動資訊', href: '#', active: false },
      { label: '活動公告', href: '#', active: false },
      { label: '最新消息', href: '#', active: false },
      { label: '線上藝廊', href: 'Gallery.dc.html', active: true }
    ];
    const navItems = items.map((it) => ({
      label: it.label,
      href: it.href,
      style: `position:relative; background:none; border:none; padding:6px 2px; cursor:pointer; text-decoration:none; font-family:'Noto Serif TC',serif; font-size:18px; letter-spacing:3px; font-weight:500; color:#ffffff; opacity:${it.active ? 1 : 0.8}; transition:opacity .2s ease;`,
      underline: `position:absolute; left:0; right:0; bottom:-2px; height:2px; border-radius:2px; background:${it.active ? '#ffffff' : 'transparent'}; transition:background .2s ease;`
    }));
    return { navItems, stars: this.buildStars(), sparkles: this.buildSparkles() };
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face {
  font-family: 'RiXingSong';
  src: url('assets/rixingsong-semibold.otf') format('opentype');
  font-weight: 600;
  font-display: swap;
}
@keyframes twinkle {
  0%,100% { opacity: var(--lo, 0.18); transform: scale(0.8); }
  50%     { opacity: var(--hi, 1); transform: scale(1.15); }
}
@keyframes frameFloat {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-7px); }
  100% { transform: translateY(0px); }
}
@keyframes wave {
  0%,100% { transform: scaleY(0.3); }
  50%     { transform: scaleY(1); }
}
* { box-sizing: border-box; }
</style>
</helmet>
<div style="width: 1600px; min-height: 980px; background: #04060f; font-family: 'Noto Serif TC', serif; position: relative; overflow: hidden;">

  <img src="assets/galaxy.png" alt="" style="position: absolute; top:0; left:0; width: 100%; height: 1500px; object-fit: cover; opacity: 0.9;" />
  <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(4,6,15,0.55) 0%, rgba(4,6,15,0.78) 55%, #04060f 100%);"></div>

  <div style="position: absolute; top:0; left:0; width:100%; height: 1500px; z-index: 2; pointer-events: none;">
    <sc-for list="{{ stars }}" as="s" hint-placeholder-count="0">
      <span style="{{ s.style }}"></span>
    </sc-for>
  </div>

  <nav style="position: relative; z-index: 30; height: 64px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 40px;">
    <a href="Banner.dc.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
      <img src="assets/logo.png" alt="臺北生成藝術節 TAIPEI GENERATIVE ART FESTIVAL" style="height: 44px; width: auto; display: block;" />
    </a>
    <div style="display: flex; align-items: center; gap: 50px;">
      <a href="Banner.dc.html" style="text-decoration:none; color:#fff; opacity:0.8; font-size:18px; letter-spacing:3px; font-weight:500;" style-hover="opacity:1;">首頁</a>
      <a href="#" style="text-decoration:none; color:#fff; opacity:0.8; font-size:18px; letter-spacing:3px; font-weight:500;" style-hover="opacity:1;">活動資訊</a>
      <a href="#" style="text-decoration:none; color:#fff; opacity:0.8; font-size:18px; letter-spacing:3px; font-weight:500;" style-hover="opacity:1;">活動公告</a>
      <a href="#" style="text-decoration:none; color:#fff; opacity:0.8; font-size:18px; letter-spacing:3px; font-weight:500;" style-hover="opacity:1;">最新消息</a>
      <a href="Gallery.dc.html" style="position:relative; text-decoration:none; color:#fff; opacity:1; font-size:18px; letter-spacing:3px; font-weight:500;">線上藝廊<span style="position:absolute; left:0; right:0; bottom:-2px; height:2px; border-radius:2px; background:#fff;"></span></a>
    </div>
  </nav>

  <div style="position: relative; z-index: 10; padding: 54px 64px 80px;">

    <a href="Gallery.dc.html" style="display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:rgba(255,255,255,0.7); font-family:'Noto Sans TC',sans-serif; font-size:16px; letter-spacing:3px; margin-bottom:20px;" style-hover="color:#fff;">← 返回線上藝廊</a>
    <div style="display: flex; align-items: flex-end; gap: 30px; margin-bottom: 22px;">
      <div style="font-family: 'RiXingSong','Noto Serif TC',serif; font-weight: 600; color:#fff; font-size: 88px; line-height: 0.9; letter-spacing: 4px; text-shadow: 0 4px 24px rgba(0,0,0,0.6);">2026</div>
      <div style="flex: none; width: 70px; height: 1px; background: rgba(255,255,255,0.55); margin-bottom: 22px;"></div>
      <div style="flex: none; display: flex; align-items: center; gap: 11px; margin-bottom: 12px;">
        <sc-for list="{{ catTabs }}" as="t" hint-placeholder-count="5">
          <button onClick="{{ t.onClick }}" style="{{ t.style }}" style-hover="border-color: rgba(255,255,255,0.9); color:#fff;">{{ t.label }}</button>
        </sc-for>
      </div>
      <div style="flex: 1;"></div>
      <div style="flex: none; white-space: nowrap; font-family: 'Noto Sans TC', sans-serif; color: rgba(255,255,255,0.55); font-size: 15px; letter-spacing: 3px; margin-bottom: 18px;">共 200 件作品</div>
    </div>

    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 8px; min-height: 32px;">
      <span style="font-family: 'Noto Sans TC', sans-serif; font-size: 14px; letter-spacing: 4px; color: rgba(180,200,255,0.85);">主題</span>
      <span style="width: 1px; height: 16px; background: rgba(255,255,255,0.25);"></span>
      <sc-for list="{{ themeChips }}" as="c" hint-placeholder-count="2">
        <button onClick="{{ c.onClick }}" style="{{ c.style }}" style-hover="border-color: rgba(255,255,255,0.7); color:#fff;">{{ c.label }}</button>
      </sc-for>
    </div>

    <div style="display: grid; grid-template-columns: repeat(4, 300px); justify-content: space-between; row-gap: 44px; margin-top: 40px; align-items: start;">
      <sc-for list="{{ works }}" as="w" hint-placeholder-count="12">
        <a href="{{ w.href }}" style="{{ w.linkStyle }}" style-hover="transform: translateY(-6px) scale(1.025);">
          <div style="position: relative; padding: 10px; height: {{ w.h }}; border: 1px solid rgba(255,255,255,0.34); background: rgba(255,255,255,0.025); box-shadow: 0 16px 44px rgba(0,0,0,0.5);">
            <div style="position: absolute; inset: 4px; border: 1px solid rgba(255,255,255,0.14); pointer-events: none; z-index: 3;"></div>
            <div style="width: 100%; height: 100%; background: rgba(255,255,255,0.045); display: flex; align-items: center; justify-content: center; overflow: hidden;">
              <span style="font-family: 'Noto Sans TC', sans-serif; color: rgba(255,255,255,0.2); font-size: 13px; letter-spacing: 4px;">作品 {{ w.no }}</span>
            </div>

            <sc-if value="{{ w.isComic }}" hint-placeholder-val="{{ false }}">
              <img src="assets/manga-cover.png" alt="漫畫封面" style="position:absolute; inset:10px; width:calc(100% - 20px); height:calc(100% - 20px); object-fit:cover; z-index:1;" />
            </sc-if>

            <sc-if value="{{ w.isMusic }}" hint-placeholder-val="{{ false }}">
              <img src="assets/music-cover.png" alt="音樂封面" style="position:absolute; inset:10px; width:calc(100% - 20px); height:calc(100% - 20px); object-fit:cover; z-index:1;" />
            </sc-if>

            <div style="{{ w.badgeStyle }}">{{ w.badgeLabel }}</div>

            <sc-if value="{{ w.isVideo }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute; inset:10px; display:flex; align-items:center; justify-content:center; z-index:2; pointer-events:none;">
                <div style="width:62px; height:62px; border-radius:50%; background:rgba(10,12,20,0.45); border:1.5px solid rgba(255,255,255,0.85); display:flex; align-items:center; justify-content:center; backdrop-filter: blur(2px);">
                  <span style="margin-left:4px; border-style:solid; border-width:11px 0 11px 18px; border-color:transparent transparent transparent #fff;"></span>
                </div>
              </div>
              <div style="position:absolute; right:14px; bottom:14px; z-index:2; font-family:'Noto Sans TC',sans-serif; font-size:12px; letter-spacing:1px; color:#fff; background:rgba(0,0,0,0.55); padding:2px 8px; border-radius:4px;">{{ w.dur }}</div>
            </sc-if>

            <sc-if value="{{ w.isMusic }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute; inset:10px; display:flex; align-items:center; justify-content:center; z-index:2; pointer-events:none;">
                <div style="width:60px; height:60px; border-radius:50%; background:rgba(10,12,20,0.45); border:1.5px solid rgba(180,205,255,0.9); display:flex; align-items:center; justify-content:center;">
                  <span style="font-size:30px; line-height:1; color:#fff;">♪</span>
                </div>
              </div>
              <div style="position:absolute; left:14px; right:14px; bottom:14px; z-index:2; display:flex; align-items:flex-end; justify-content:center; gap:3px; height:30px; pointer-events:none;">
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.0s infinite;"></span>
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.15s infinite;"></span>
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.3s infinite;"></span>
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.45s infinite;"></span>
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.6s infinite;"></span>
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.4s infinite;"></span>
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.2s infinite;"></span>
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.05s infinite;"></span>
                <span style="width:3px; height:26px; background:rgba(190,210,255,0.95); border-radius:2px; transform-origin:bottom; animation: wave 1.1s ease-in-out 0.35s infinite;"></span>
              </div>
            </sc-if>
          </div>
        </a>
      </sc-for>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { cat: 0, theme: 0 };

  cats() {
    return [
      { name: '全部', media: 'mixed', themes: [], aspect: 1.0 },
      { name: '漫畫創作', media: 'comic', themes: ['我在臺北數位學習的一天'], aspect: 0.72 },
      { name: '圖像創作', media: 'image', themes: ['好家在-守護家的韌性日常'], aspect: 0.82 },
      { name: '影片創作', media: 'video', themes: ['秋OUT音樂節', '遷園40周年'], aspect: 1.5 },
      { name: '音樂創作', media: 'music', themes: ['暢遊臺北商圈'], aspect: 1.3 }
    ];
  }

  buildStars() {
    if (this._stars) return this._stars;
    const rnd = (s) => { const x = Math.sin(s * 99.13) * 43758.5453; return x - Math.floor(x); };
    const out = [];
    for (let i = 0; i < 110; i++) {
      const left = rnd(i + 1) * 100;
      const top = rnd(i + 7.3) * 100;
      const size = 1 + rnd(i + 3.1) * 2.2;
      const dur = 2.0 + rnd(i + 5.7) * 3.8;
      const delay = rnd(i + 11.9) * 4;
      const hi = 0.6 + rnd(i + 2.2) * 0.4;
      const big = rnd(i + 8.8) > 0.9;
      const glow = big ? `0 0 ${size * 3}px ${size}px rgba(180,200,255,0.5)` : 'none';
      out.push({ style: `position:absolute; left:${left}%; top:${top * 15}px; width:${size}px; height:${size}px; border-radius:50%; background:#eef3ff; box-shadow:${glow}; --hi:${hi}; --lo:0.1; animation: twinkle ${dur}s ease-in-out ${delay}s infinite; will-change: opacity, transform;` });
    }
    this._stars = out;
    return out;
  }

  badgeFor(media) {
    const base = `position:absolute; left:14px; top:14px; z-index:3; white-space:nowrap; font-family:'Noto Sans TC',sans-serif; font-size:12px; letter-spacing:2px; padding:3px 11px; border-radius:999px; color:#fff;`;
    if (media === 'video') return { label: '影片', style: base + 'background:rgba(40,80,170,0.65); border:1px solid rgba(150,180,255,0.6);' };
    if (media === 'music') return { label: '音樂', style: base + 'background:rgba(30,120,110,0.6); border:1px solid rgba(150,230,210,0.55);' };
    if (media === 'comic') return { label: '漫畫', style: base + 'background:rgba(150,90,40,0.6); border:1px solid rgba(240,190,140,0.55);' };
    return { label: '圖像', style: base + 'background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3);' };
  }

  renderVals() {
    const cats = this.cats();
    const ci = this.state.cat;
    const active = cats[ci];

    const catTabs = cats.map((c, i) => {
      const on = i === ci;
      return {
        label: c.name,
        onClick: () => this.setState({ cat: i, theme: 0 }),
        style: `flex:none; white-space:nowrap; background:${on ? 'rgba(255,255,255,0.18)' : 'transparent'}; border:1px solid ${on ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.35)'}; color:${on ? '#fff' : 'rgba(255,255,255,0.72)'}; border-radius:999px; padding:9px 20px; font-family:'RiXingSong','Noto Serif TC',serif; font-size:18px; letter-spacing:2px; cursor:pointer; transition:all .2s ease;`
      };
    });

    const themeLabels = active.themes.length ? ['全部', ...active.themes] : ['全部'];
    const ti = this.state.theme;
    const themeChips = themeLabels.map((label, i) => {
      const on = i === ti;
      return {
        label,
        onClick: () => this.setState({ theme: i }),
        style: `flex:none; white-space:nowrap; background:${on ? 'rgba(255,255,255,0.14)' : 'transparent'}; border:1px solid ${on ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.28)'}; color:${on ? '#fff' : 'rgba(255,255,255,0.6)'}; border-radius:999px; padding:6px 18px; font-family:'Noto Sans TC',sans-serif; font-size:15px; letter-spacing:1.5px; cursor:pointer; transition:all .2s ease;`
      };
    });

    const col = 300;
    const mixedPattern = ['comic', 'video', 'music', 'image', 'video', 'comic', 'music', 'video', 'image', 'music', 'video', 'comic'];
    const aspByMedia = { image: 0.82, comic: 0.72, video: 1.5, music: 1.3 };
    const durs = ['01:24', '02:38', '03:05', '00:58', '02:12', '01:47'];

    const works = Array.from({ length: 12 }, (_, i) => {
      const media = active.media === 'mixed' ? mixedPattern[i] : active.media;
      const asp = active.media === 'mixed' ? aspByMedia[media] : active.aspect;
      const badge = this.badgeFor(media);
      return {
        no: String(i + 1).padStart(3, '0'),
        h: Math.round(col / asp) + 'px',
        href: `Artwork.dc.html?year=2026${media === 'image' ? '' : '&type=' + media}`,
        isComic: media === 'comic',
        isVideo: media === 'video',
        isMusic: media === 'music',
        dur: durs[i % durs.length],
        badgeLabel: badge.label,
        badgeStyle: badge.style,
        linkStyle: `display:block; text-decoration:none; transition: transform .4s cubic-bezier(.2,.7,.3,1); will-change: transform; animation: frameFloat ${5.5 + (i % 4) * 0.6}s ease-in-out ${(i % 5) * 0.4}s infinite;`
      };
    });

    return { catTabs, themeChips, works, stars: this.buildStars() };
  }
}
</script>
</body>
</html>
